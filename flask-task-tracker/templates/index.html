<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1>📋 Task Tracker</h1>
        <p>Manage your tasks efficiently</p>
      </div>
    </header>

    <!-- Stats Section -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="totalTasks">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="completedTasks">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="inProgressTasks">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="progress-card">
        <div class="progress-label">Overall Progress</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
    </div>

    <!-- Add Task Section -->
    <div class="add-task-section">
      <button class="btn-primary" onclick="openAddTaskModal()">+ Add New Task</button>
    </div>

    <!-- Filters Section -->
    <div class="filters-section">
      <div class="filter-group">
        <label>Filter by Status:</label>
        <selectid="statusFilter" onchange="applyFilters()">
          <option value="">All Status</option>
          <option value="Not Started">Not Started</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Filter by Priority:</label>
        <selectid="priorityFilter" onchange="applyFilters()">
          <option value="">All Priority</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </div>

    <!-- Tasks Container -->
    <div class="tasks-container" id="tasksList">
      <!-- Tasks will be loaded here -->
    </div>
  </div>

  <!-- Add/Edit Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeTaskModal()">&times;</span>
      <h2 id="modalTitle">Add New Task</h2>
      
      <form id="taskForm">
        <div class="form-group">
          <label for="taskTitle">Task Title *</label>
          <input type="text" id="taskTitle" required>
        </div>

        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="4"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="Not Started" selected>Not Started</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskCategory">Category</label>
            <input type="text" id="taskCategory" placeholder="e.g., Work, Personal">
          </div>

          <div class="form-group">
            <label for="taskDueDate">Due Date</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>

        <div class="form-buttons">
          <button type="submit" class="btn-primary">Save Task</button>
          <button type="button" class="btn-secondary" onclick="closeTaskModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
